name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 07:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        go-version: ['1.25', '1.26']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Test
        shell: bash
        run: |
          gotestsum \
            --junitfile "junit-${{ matrix.os }}-${{ matrix.go-version }}.xml" \
            --format testname -- \
            -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload JUnit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-${{ matrix.os }}-${{ matrix.go-version }}
          path: junit-${{ matrix.os }}-${{ matrix.go-version }}.xml

      - name: Coverage gate (per-OS)
        if: matrix.go-version == '1.26'
        shell: bash
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage on ${{ matrix.os }}: ${COVERAGE}%"
          case "${{ matrix.os }}" in
            macos-latest)
              THRESHOLD=95
              ;;
            ubuntu-latest|windows-latest)
              echo "No threshold set yet for ${{ matrix.os }} — iterating to establish baseline"
              exit 0
              ;;
          esac
          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "::error::Coverage on ${{ matrix.os }} is ${COVERAGE}%, below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage on ${{ matrix.os }} meets threshold ${THRESHOLD}%"

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: ${{ matrix.os }}
          fail_ci_if_error: false

  publish-test-results:
    name: Publish test results
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: junit-*
          merge-multiple: true

      - uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: junit-*.xml

  lint:
    name: Lint
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.2

  security:
    name: Security scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run gosec (produce SARIF)
        uses: securego/gosec@v2.25.0
        continue-on-error: true
        with:
          args: '-fmt sarif -out gosec.sarif ./...'

      - name: Upload SARIF to Security tab
        if: always() && hashFiles('gosec.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

      - name: Fail on gosec findings
        if: always()
        shell: bash
        run: |
          if [ ! -s gosec.sarif ]; then
            echo "::error::gosec did not produce a SARIF file"
            exit 1
          fi
          findings=$(jq '[.runs[].results[]] | length' gosec.sarif)
          if [ "$findings" -gt 0 ]; then
            echo "::error::gosec found $findings issue(s) — see Security tab"
            jq -r '.runs[].results[] | "\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine): \(.message.text)"' gosec.sarif
            exit 1
          fi
          echo "gosec found 0 issues"

  vuln:
    name: Vulnerability scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26'

  pr-verify:
    name: PR verify (ubuntu-latest, Go 1.26)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.6.2
