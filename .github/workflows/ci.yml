name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 7 * * 1'  # Every Monday 07:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        go-version: ['1.25', '1.26']
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        shell: bash
        run: |
          go tool gotestsum \
            --junitfile "junit-${{ matrix.os }}-${{ matrix.go-version }}.xml" \
            --format testname -- \
            -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload JUnit results
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: always()
        with:
          name: junit-${{ matrix.os }}-${{ matrix.go-version }}
          path: junit-${{ matrix.os }}-${{ matrix.go-version }}.xml

      - name: Coverage gate (per-OS)
        shell: bash
        run: |
          # Per-function breakdown logged on every run so we can act on
          # coverage drops without re-running CI in debug mode.
          echo "Per-function coverage on ${{ matrix.os }}:"
          go tool cover -func=coverage.out
          echo "---"
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Coverage on ${{ matrix.os }}: ${COVERAGE}%"
          THRESHOLD=95
          # Use awk for floating-point comparison: bc isn't on the Windows
          # runner, and silently absent bc made the gate report success
          # regardless of the actual number. awk is preinstalled on every
          # GitHub-hosted runner including windows-latest (Git Bash).
          if awk -v cov="$COVERAGE" -v thr="$THRESHOLD" 'BEGIN { exit !(cov < thr) }'; then
            echo "::error::Coverage on ${{ matrix.os }} is ${COVERAGE}%, below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "Coverage on ${{ matrix.os }} meets threshold ${THRESHOLD}%"

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          use_oidc: true
          files: ./coverage.out
          flags: ${{ matrix.os }}
          fail_ci_if_error: false

  publish-test-results:
    name: Publish test results
    needs: test
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: junit-*
          merge-multiple: true

      - uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2
        with:
          files: junit-*.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
        with:
          version: v2.6.2

  security:
    name: Security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run gosec (produce SARIF)
        uses: securego/gosec@223e19b8856e00f02cc67804499a83f77e208f3c # v2.25.0
        continue-on-error: true
        with:
          args: '-fmt sarif -out gosec.sarif ./...'

      - name: Upload SARIF to Security tab
        if: |
          always() &&
          hashFiles('gosec.sarif') != '' &&
          github.event.repository.private == false
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: gosec.sarif

      - name: Fail on gosec findings
        if: always()
        shell: bash
        run: |
          if [ ! -s gosec.sarif ]; then
            echo "::error::gosec did not produce a SARIF file"
            exit 1
          fi
          findings=$(jq '[.runs[].results[]] | length' gosec.sarif)
          if [ "$findings" -gt 0 ]; then
            echo "::error::gosec found $findings issue(s) — see Security tab"
            jq -r '.runs[].results[] | "\(.locations[0].physicalLocation.artifactLocation.uri):\(.locations[0].physicalLocation.region.startLine): \(.message.text)"' gosec.sarif
            exit 1
          fi
          echo "gosec found 0 issues"

  vuln:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache-dependency-path: go.sum

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: '1.26'
